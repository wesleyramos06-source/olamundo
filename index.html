<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Cliente</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <form id="cadastroForm">
            <h2>Novo Cliente</h2>
            <div class="input-group">
                <label for="nome">Nome Completo</label>
                <input type="text" id="nome" placeholder="Ex: João Silva" required>
            </div>
            <div class="input-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" placeholder="joao@email.com" required>
            </div>
            <div class="input-group">
                <label for="telefone">Telefone</label>
                <input type="tel" id="telefone" placeholder="(11) 99999-9999">
            </div>
            <button type="submit">Cadastrar Cliente</button>
        </form>
        <div id="mensagem"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Teste de Botão</title>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding-top: 50px; background: #f0f2f5; }
        .box { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        
        .btn-github { background: #24292e; color: white; border: none; padding: 10px 20px; cursor: pointer; border-radius: 5px; margin-bottom: 15px; }
        
        .btn-finalizar { background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 5px; font-weight: bold; }
        
        /* O estilo quando está travado */
        .btn-finalizar:disabled { background: #ccc; cursor: not-allowed; }
    </style>
</head>
<body>

    <div class="box">
        <h3>Passo 1:</h3>
        <button id="githubBtn" class="btn-github">Simular Login GitHub</button>
        
        <hr>
        
        <h3>Passo 2:</h3>
        <button id="finalizarBtn" class="btn-finalizar" disabled>Finalizar Cadastro</button>
        <p id="status" style="color: red; font-size: 12px;">Bloqueado: Use o botão acima primeiro.</p>
    </div>

    <script>
        // Usamos o DOMContentLoaded para garantir que o HTML carregou antes do script
        document.addEventListener('DOMContentLoaded', () => {
            const btnGit = document.getElementById('githubBtn');
            const btnFim = document.getElementById('finalizarBtn');
            const texto = document.getElementById('status');

            btnGit.onclick = function() {
                console.log("Botão GitHub clicado!"); // Aparecerá no F12
                
                // Libera o botão
                btnFim.disabled = false;
                
                // Muda o texto e a cor
                texto.innerText = "Liberado! Agora você pode finalizar.";
                texto.style.color = "green";
                
                alert("GitHub validado!");
            };

            btnFim.onclick = function() {
                alert("Cadastro concluído com sucesso!");
            };
        });
    </script>
</body>
</html>
